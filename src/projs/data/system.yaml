# Default system configuration
# This file is copied to ~/.projects/system.yaml on first run.
# Edit ~/.projects/system.yaml to customize — do not edit this file.
#
# Note: editor is a convenience shortcut — at launch, projs runs `editor .`
# in your project directory. You can achieve the same result by adding
# your editor as a custom command on any project instead.

editor: ""              # prompted on first run
package_manager: unknown  # auto-detected on first run from platforms.yaml
author: ""              # prompted on first run — used in LICENSE files

launch_mode: standard   # standard | debug
                        # standard — fire commands and attach tmux immediately
                        # debug    — show command log, wait for manual Go

preferences:
  clear_screen_on_menu: true
  show_confirmations: true

# projs Apple IIc theme
# Green phosphor on near-black. 

name: "Apple IIc"
ttkbootstrap_theme: "darkly"

# Typography — monospace everywhere for that authentic terminal feel
font_family: "Courier"
font_size: 12
header_font_family: "Courier"
header_font_size: 24

# Icons — can ship green-tinted versions of the default icons
# or leave as null to fall back to text-only labels
icons:
  logo:        null
  dashboard:   null
  new_project: null
  settings:    null
  help:        null

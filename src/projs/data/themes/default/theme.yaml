# projs default theme
# Based on the PCCleaner/pulse style

name: "Default"
ttkbootstrap_theme: "pulse"

# Typography
font_family: "TkDefaultFont"
font_size: 11
header_font_family: "TkDefaultFixed"
header_font_size: 24

# Icons
# Paths are relative to this theme directory
# Set to null to hide the icon (text label will still show)
icons:
  logo:        "icons/logo.png"
  dashboard:   "icons/dashboard.png"
  new_project: "icons/new_project.png"
  settings:    "icons/settings.png"
  help:        "icons/help.png"
